services:
  - type: web
    name: ban-hoc-backend-v2
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start_render.py
    healthCheckPath: /api/v1/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEED_PERSONA_DATA
        value: "false"
      - key: SEED_PERSONA_RESET_NON_ADMIN
        value: "false"
      - key: SEED_VISUAL_SUPPORT_DEMO
        value: "false"
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: GEMINI_API_KEYS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ban-hoc-db-v2
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: ban-hoc-frontend-v2
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: ban-hoc-frontend-v2
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ban-hoc-backend-v2
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: ban-hoc-db-v2
    plan: free
    databaseName: ban_hoc_thong_minh
    user: ban_hoc_user
