services:
  - type: web
    name: ban-hoc-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: flask --app run.py seed-base && gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /api/v1/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ban-hoc-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: ban-hoc-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: ban-hoc-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ban-hoc-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: ban-hoc-db
    plan: free
    databaseName: ban_hoc_thong_minh
    user: ban_hoc_user
