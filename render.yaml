services:
  - type: web
    name: ban-hoc-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python init_and_seed.py
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 30 --keep-alive 5
    healthCheckPath: /api/v1/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEED_PERSONA_DATA
        value: "true"
      - key: SEED_PERSONA_RESET_NON_ADMIN
        value: "true"
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: GEMINI_API_KEYS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ban-hoc-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: ban-hoc-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: ban-hoc-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ban-hoc-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: ban-hoc-db
    plan: free
    databaseName: ban_hoc_thong_minh
    user: ban_hoc_user
