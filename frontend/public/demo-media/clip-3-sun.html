<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip 3</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #203a76 0%, #57a6ff 58%, #b6f4f2 100%);
    }

    .card {
      width: min(84vw, 360px);
      aspect-ratio: 1;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.26);
      padding: 2rem;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      color: white;
      backdrop-filter: blur(8px);
    }

    .sun {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at top, #fff6a6 0%, #ffd14a 68%, #ff9f1a 100%);
      box-shadow: 0 0 0 18px rgba(255, 235, 144, 0.12), 0 0 0 36px rgba(255, 235, 144, 0.08);
      animation: rise 2.2s infinite ease-in-out;
    }

    h1 {
      margin: 1.1rem 0 0.45rem;
      font-size: 2rem;
    }

    p {
      margin: 0;
      font-weight: 700;
      opacity: 0.92;
    }

    @keyframes rise {
      0%, 100% { transform: translateY(8px); }
      50% { transform: translateY(-18px); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="sun"></div>
    <h1>Ban ngay</h1>
    <p>Thuong nhin thay mat troi hay mat trang?</p>
  </main>
</body>
</html>
