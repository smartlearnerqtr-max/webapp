<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip 4</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.28), transparent 26%),
        linear-gradient(180deg, #0c4d7d 0%, #1787b9 56%, #8be7ea 100%);
    }

    .card {
      width: min(84vw, 360px);
      aspect-ratio: 1;
      border-radius: 36px;
      background: rgba(239, 252, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.28);
      padding: 2rem;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .fish {
      position: relative;
      width: 150px;
      height: 80px;
      border-radius: 80px;
      background: linear-gradient(180deg, #ff9ac1 0%, #ff6f8d 100%);
      animation: swim 2.4s infinite ease-in-out;
    }

    .fish::before {
      content: '';
      position: absolute;
      right: -36px;
      top: 18px;
      width: 0;
      height: 0;
      border-left: 40px solid #ff7b99;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
    }

    .fish::after {
      content: '';
      position: absolute;
      left: 22px;
      top: 26px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #173042;
    }

    h1 {
      margin: 1rem 0 0.4rem;
      font-size: 2rem;
    }

    p {
      margin: 0;
      font-weight: 700;
      opacity: 0.92;
    }

    @keyframes swim {
      0%, 100% { transform: translateX(-16px); }
      50% { transform: translateX(16px); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="fish"></div>
    <h1>Con ca</h1>
    <p>Con vat nay boi duoi nuoc hay bay tren troi?</p>
  </main>
</body>
</html>
