<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip 2</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.48), transparent 28%),
        linear-gradient(180deg, #ffcf52 0%, #ffb71f 100%);
    }

    .card {
      width: min(84vw, 360px);
      aspect-ratio: 1;
      border-radius: 36px;
      background: rgba(255, 247, 214, 0.92);
      box-shadow: 0 26px 42px rgba(154, 94, 8, 0.18);
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    .banana {
      width: 170px;
      height: 80px;
      border-radius: 80px 24px 80px 80px;
      background: linear-gradient(180deg, #fff38e 0%, #ffd94f 100%);
      border: 5px solid #c88c16;
      transform: rotate(-15deg);
      animation: swing 1.8s infinite ease-in-out;
      box-shadow: inset 0 -12px 0 rgba(255, 183, 31, 0.36);
    }

    .banana::before,
    .banana::after {
      content: '';
      position: absolute;
      background: #8f5a11;
      border-radius: 999px;
    }

    .banana::before {
      width: 16px;
      height: 16px;
      left: 98px;
      top: 140px;
    }

    .banana::after {
      width: 16px;
      height: 16px;
      left: 244px;
      top: 86px;
    }

    h1 {
      margin: 1rem 0 0.35rem;
      font-size: 2rem;
      color: #754300;
    }

    p {
      margin: 0;
      color: #8a5716;
      font-weight: 700;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-15deg) translateY(0); }
      50% { transform: rotate(-7deg) translateY(-10px); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="banana"></div>
    <h1>Qua chuoi</h1>
    <p>Mau gi la mau dung?</p>
  </main>
</body>
</html>
