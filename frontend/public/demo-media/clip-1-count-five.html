<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip 1</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 234, 165, 0.95), transparent 36%),
        linear-gradient(180deg, #123b72 0%, #1c69b0 52%, #6dd6c5 100%);
      color: #ffffff;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      animation: drift 6s infinite ease-in-out;
    }

    .bubble-a {
      width: 180px;
      height: 180px;
      top: 8%;
      left: 10%;
    }

    .bubble-b {
      width: 120px;
      height: 120px;
      bottom: 12%;
      right: 12%;
      animation-delay: -2s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(84vw, 360px);
      aspect-ratio: 1;
      padding: 2rem;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      box-shadow: 0 28px 44px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .question {
      margin: 1rem 0 0.75rem;
      font-size: 2rem;
      font-weight: 800;
    }

    .equation {
      font-size: 4.3rem;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
      animation: pulse 1.4s infinite ease-in-out;
    }

    .hint {
      margin-top: 1rem;
      font-size: 1rem;
      opacity: 0.92;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-22px) translateX(14px); }
    }
  </style>
</head>
<body>
  <div class="bubble bubble-a"></div>
  <div class="bubble bubble-b"></div>
  <main class="card">
    <div class="eyebrow">Clip ngan 1</div>
    <div class="question">So nao dung?</div>
    <div class="equation">2 + 3</div>
    <div class="hint">Hay chon dap an dung o ben duoi</div>
  </main>
</body>
</html>
